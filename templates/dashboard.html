<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Classroom Monitor</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #0b0f19;
      --surface: #151b2b;
      --border: #222e45;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #10b981;
      --orange: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --surface-glow: rgba(16, 185, 129, 0.05);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      padding: 20px 30px;
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
    }

    .title {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .status-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .cam-ip {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      font-family: monospace;
    }

    .badge {
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      border: 1px solid var(--muted);
      color: var(--muted);
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .badge.online {
      border-color: var(--green);
      color: var(--green);
      background: rgba(16, 185, 129, 0.1);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
    }

    .alert {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid var(--red);
      color: var(--red);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 1.2rem;
      margin-bottom: 20px;
      animation: blink 1.5s infinite;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
    }

    @keyframes blink {
      50% { opacity: 0.7; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 30px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .panel h3 {
      margin-top: 0;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .score-container {
      text-align: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .score-value {
      font-size: 5.5rem;
      font-weight: 900;
      line-height: 1;
      color: var(--green);
      transition: color 0.5s ease;
      text-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    
    .metric:last-child { border: none; }

    .metric span { color: var(--muted); font-size: 0.95rem; }
    .metric strong { font-size: 1.1rem; font-weight: 600; }

    .video-container {
      width: 100%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      position: relative;
      box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
    }

    #videoFeed {
      max-width: 100%;
      height: auto;
      display: none;
      border-radius: 12px;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      color: var(--muted);
    }
    
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    .emo-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
    }

    .emo-name {
      width: 70px;
      text-align: right;
      font-size: 0.85rem;
      text-transform: capitalize;
      color: var(--text);
    }

    .emo-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    .emo-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .emo-val {
      width: 30px;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="title">AI Classroom Monitor</div>
    <div class="status-area">
      <span id="camIPLabel" class="cam-ip">Awaiting Connection...</span>
      <div id="badgeCam" class="badge">OFFLINE</div>
    </div>
  </div>

  <div id="alertBanner" class="alert">
    ⚠ LOW ENGAGEMENT DETECTED — TEACHER ALERT ACTIVE ⚠
  </div>

  <div class="grid">
    <!-- Left Panel: Metrics -->
    <div class="panel">
      <h3>Class Engagement</h3>
      <div class="score-container">
        <div id="scoreVal" class="score-value">--%</div>
      </div>

      <div>
        <div class="metric"><span>Students Detected</span> <strong id="studentVal">0</strong></div>
        <div class="metric"><span>Total Scans</span> <strong id="scanCount">0</strong></div>
        <div class="metric"><span>Last Update</span> <strong id="lastScan">--:--:--</strong></div>
      </div>

      <h3 style="margin-top: 40px;">Emotion Breakdown</h3>
      <div id="emoList">
        <div style="color:var(--muted); text-align:center; padding: 20px 0;">Waiting for AI data...</div>
      </div>
    </div>

    <!-- Right Panel: Live Feed -->
    <div class="panel">
      <h3>Live Analysis Feed</h3>
      <div class="video-container">
        <div id="loaderDiv" class="loader">
          <div class="spinner"></div>
          <div>Waiting for ESP32-CAM (5s interval)...</div>
        </div>
        <img id="videoFeed" src="" alt="Live Feed" />
      </div>
    </div>
  </div>

  <script>
    const socket = io();

    // 1. Receive processed image
    socket.on('live_stream', (data) => {
      const img = document.getElementById('videoFeed');
      const loader = document.getElementById('loaderDiv');
      
      img.src = data.image;
      img.style.display = 'block';
      loader.style.display = 'none';
    });

    // 2. Receive AI stats
    socket.on('analysis_update', (data) => {
      // Update Engagement Score
      const scoreEl = document.getElementById('scoreVal');
      scoreEl.innerText = data.score + "%";
      
      if (data.score >= 70) {
        scoreEl.style.color = 'var(--green)';
        scoreEl.style.textShadow = '0 0 40px rgba(16, 185, 129, 0.2)';
      } else if (data.score >= 40) {
        scoreEl.style.color = 'var(--orange)';
        scoreEl.style.textShadow = '0 0 40px rgba(245, 158, 11, 0.2)';
      } else {
        scoreEl.style.color = 'var(--red)';
        scoreEl.style.textShadow = '0 0 40px rgba(239, 68, 68, 0.2)';
      }

      // Update basic metrics
      document.getElementById('studentVal').innerText = data.students;
      document.getElementById('scanCount').innerText = data.scan_count;
      document.getElementById('lastScan').innerText = data.last_scan;

      // Toggle alert
      document.getElementById('alertBanner').style.display = data.alert ? 'block' : 'none';

      // Update Emotions
      const maxCnt = Math.max(1, ...Object.values(data.emotions || {}));
      const ALL_EMOS = ["happy", "surprise", "neutral", "fear", "sad", "angry", "disgust"];

      let emoHTML = "";
      ALL_EMOS.forEach(e => {
        const cnt = (data.emotions || {})[e] || 0;
        const pct = Math.round((cnt / maxCnt) * 100);
        
        let colorGrad = 'linear-gradient(90deg, var(--blue), var(--green))';
        if (["fear", "sad", "angry", "disgust"].includes(e)) {
            colorGrad = 'linear-gradient(90deg, var(--orange), var(--red))';
        }

        emoHTML += `
          <div class="emo-row">
            <span class="emo-name">${e}</span>
            <div class="emo-track"><div class="emo-fill" style="width:${pct}%; background: ${colorGrad}"></div></div>
            <span class="emo-val">${cnt}</span>
          </div>`;
      });
      document.getElementById('emoList').innerHTML = emoHTML;
    });

    // 3. Monitor Camera Status
    socket.on('cam_status', (data) => {
      const badge = document.getElementById('badgeCam');
      if (data.status === 'online') {
        badge.className = "badge online";
        badge.innerText = "ONLINE";
        document.getElementById('camIPLabel').innerText = "ESP32 IP: " + data.ip;
      } else {
        badge.className = "badge";
        badge.innerText = "OFFLINE";
        document.getElementById('camIPLabel').innerText = "Camera Disconnected";
        
        // Hide stream on disconnect
        document.getElementById('videoFeed').style.display = 'none';
        document.getElementById('loaderDiv').style.display = 'flex';
        document.querySelector('.loader div:nth-child(2)').innerText = 'Connection Lost. Waiting...';
      }
    });
  </script>
</body>
</html>
